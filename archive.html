<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KellerGym - Archiv</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Font Imports for Preview -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Amatic+SC:wght@700&family=Anton&family=Arvo:wght@700&family=Audiowide&family=Bangers&family=Bebas+Neue&family=Black+Ops+One&family=Cabin:wght@700&family=Cairo:wght@900&family=Comfortaa:wght@700&family=Creepster&family=Crimson+Text:wght@700&family=Dancing+Script:wght@700&family=Dosis:wght@800&family=Exo+2:wght@900&family=Fjalla+One&family=Fredoka+One&family=Hind:wght@700&family=Inconsolata:wght@900&family=Indie+Flower&family=Josefin+Sans:wght@700&family=Lato:wght@900&family=Libre+Baskerville:wght@700&family=Lobster&family=Lora:wght@700&family=Luckiest+Guy&family=Merriweather:wght@900&family=Monoton&family=Montserrat:wght@900&family=Mukta:wght@800&family=Noto+Sans:wght@900&family=Nunito:wght@900&family=Open+Sans:wght@800&family=Orbitron:wght@900&family=Oswald:wght@700&family=Pacifico&family=Permanent+Marker&family=Playfair+Display:wght@900&family=Poppins:wght@900&family=Press+Start+2P&family=PT+Sans:wght@700&family=Quicksand:wght@700&family=Raleway:wght@900&family=Righteous&family=Roboto:wght@900&family=Roboto+Condensed:wght@700&family=Roboto+Mono:wght@700&family=Russo+One&family=Shadows+Into+Light&family=Special+Elite&family=Syncopate:wght@700&family=Teko:wght@700&family=Titillium+Web:wght@900&family=Ubuntu:wght@700&family=Ultra&family=Unica+One&family=Varela+Round&family=Bruno+Ace&family=Bruno+Ace+SC&family=Chakra+Petch:wght@700&family=Electrolize&family=Gruppo&family=Iceland&family=Jura:wght@700&family=Michroma&family=Nova+Square&family=Oxanium:wght@700&family=Quantico:wght@700&family=Rationale&family=Share+Tech&family=Wallpoet&family=Zen+Dots&display=swap" rel="stylesheet">

    <style>
        body { 
            padding: 20px; 
            padding-bottom: 50px;
            overflow-y: auto !important; /* Enable scrolling */
            height: auto !important;
            display: block !important;
        }
        
        .section-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-top: 30px;
        }

        /* Font & Icon Grid */
        .misc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .misc-item {
            background: #222;
            border-radius: 8px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-mute);
        }
        
        .font-list-prof {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .font-item-prof {
            background: #222;
            padding: 10px;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-row" style="display:flex; align-items:center; gap:20px; margin-bottom:20px;">
        <a href="profile.html" class="nav-icon" style="text-decoration:none; color:white; font-size:20px;"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 style="margin:0;">Archiv</h1>
    </div>

    <!-- Icons -->
    <div class="section-header">Icons</div>
    <div class="misc-grid">
        <div class="misc-item" title="Dumbbell"><i class="fa-solid fa-dumbbell"></i></div>
        <div class="misc-item" title="Weight"><i class="fa-solid fa-weight-hanging"></i></div>
        <div class="misc-item" title="Person Lifting"><i class="fa-solid fa-person-lifting-weights"></i></div>
        <div class="misc-item" title="Hand Fist"><i class="fa-solid fa-hand-fist"></i></div>
        <div class="misc-item" title="Running"><i class="fa-solid fa-person-running"></i></div>
        <div class="misc-item" title="Stopwatch"><i class="fa-solid fa-stopwatch"></i></div>
        <div class="misc-item" title="Bolt"><i class="fa-solid fa-bolt"></i></div>
        <div class="misc-item" title="Heart Pulse"><i class="fa-solid fa-heart-pulse"></i></div>
        <div class="misc-item" title="List Check"><i class="fa-solid fa-list-check"></i></div>
        <div class="misc-item" title="Medal"><i class="fa-solid fa-medal"></i></div>
        <div class="misc-item" title="Trophy"><i class="fa-solid fa-trophy"></i></div>
        <div class="misc-item" title="Fire"><i class="fa-solid fa-fire"></i></div>
        <div class="misc-item" title="Calendar"><i class="fa-solid fa-calendar-days"></i></div>
        <div class="misc-item" title="Dungeon"><i class="fa-solid fa-dungeon"></i></div>
        <div class="misc-item" title="Utensils"><i class="fa-solid fa-utensils"></i></div>
        <div class="misc-item" title="User"><i class="fa-regular fa-user"></i></div>
    </div>
    
    <!-- Fonts -->
    <div class="section-header">Schriftarten</div>
    <div id="prof-font-list" class="font-list-prof"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
             renderFonts();
        });

        function renderFonts() {
             const fonts = [
                'Abril Fatface', 'Amatic SC', 'Anton', 'Arvo', 'Audiowide', 'Bangers', 'Bebas Neue', 
                'Black Ops One', 'Cabin', 'Cairo', 'Comfortaa', 'Creepster', 'Crimson Text', 'Dancing Script', 
                'Dosis', 'Exo 2', 'Fjalla One', 'Fredoka One', 'Hind', 'Inconsolata', 'Indie Flower', 
                'Josefin Sans', 'Lato', 'Libre Baskerville', 'Lobster', 'Lora', 'Luckiest Guy', 'Merriweather', 
                'Monoton', 'Montserrat', 'Mukta', 'Noto Sans', 'Nunito', 'Open Sans', 'Orbitron', 'Oswald', 
                'Pacifico', 'Permanent Marker', 'Playfair+Display', 'Poppins', 'Press Start 2P', 'PT Sans', 
                'Quicksand', 'Raleway', 'Righteous', 'Roboto', 'Roboto Condensed', 'Roboto Mono', 'Russo One', 
                'Shadows Into Light', 'Special Elite', 'Syncopate', 'Teko', 'Titillium Web', 'Ubuntu', 'Ultra', 
                'Unica One', 'Varela Round', 'Bruno Ace', 'Bruno Ace SC', 'Chakra Petch', 'Electrolize', 
                'Gruppo', 'Iceland', 'Jura', 'Michroma', 'Nova Square', 'Oxanium', 'Quantico', 'Rationale', 
                'Share Tech', 'Wallpoet', 'Zen Dots'
            ];
            
            const list = document.getElementById('prof-font-list');
            fonts.forEach(font => {
                const el = document.createElement('div');
                el.className = 'font-item-prof';
                // Handle spaces for CSS vs URL
                const fontName = font.replace(/\+/g, ' ');
                el.style.fontFamily = `"${fontName}", sans-serif`;
                el.innerText = '';
                el.innerHTML = 'Keller<span style="color:var(--primary)">Gym</span>';
                el.style.color = 'white';
                list.appendChild(el);
            });
        }
    </script>
</body>
</html>
