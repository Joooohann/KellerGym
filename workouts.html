<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KellerGym - Workouts</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    <style>
        body { padding-bottom: 100px; }
        
        .simple-card {
            background-color: #15161A;
            border-radius: 24px;
        }

        /* Dashboard-style Week Grid */
        .week-day-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 4px;
            transition: 0.3s;
            min-width: 40px;
            cursor: pointer; /* Added pointer */
        }
        
        .week-day-col:hover {
            background-color: rgba(255,255,255,0.05); /* Slight hover effect */
        }

        .week-day-col.selected {
             background-color: #2a2d35; /* Indicate selection */
             border-color: #444;       /* Subtle border for selected */
        }

        /* Day Active Shimmer (copied from Dashboard) */
        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-20deg); }
            100% { transform: translateX(200%) skewX(-20deg); }
        }
        .day-active {
            border-color: var(--primary) !important;
            background-color: rgba(0, 255, 204, 0.1);
            position: relative;
            overflow: hidden !important;
        }
        .day-active::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-20deg) translateX(-150%);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }

        .rig-image {
            position: absolute;
            right: 20px;
            bottom: 8px;
            height: 110px;
            width: auto;
            object-fit: contain;
        }
        
        @media (min-width: 600px) {
            .rig-image {
                right: 50px; 
            }
        }

        p { margin-bottom: 0; }

        .start-btn {
            background-color: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 30px; /* Reduced padding slightly */
            border-radius: 30px;
            font-size: 16px; /* Slightly smaller font to fit tight space if needed */
            font-weight: 700;
            cursor: pointer;
            width: auto;
            min-width: 140px;
            display: inline-block;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .start-btn:active {
            background-color: var(--primary);
            color: white;
        }

        /* Disabled state for non-today days */
        .start-btn:disabled, .start-btn.disabled {
            border-color: #333;
            color: #555;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        <!-- Header -->
        <div class="header-row" style="justify-content:center; margin-top:10px; margin-bottom: 25px;">
            <h1 style="font-family: 'Black Ops One', cursive; color: var(--primary); font-size: 32px; margin:0; font-weight: 400;">Training</h1>
        </div>

        <!-- Week Grid -->
        <div class="simple-card" style="padding: 15px; margin-bottom: 25px;">
            <div style="font-size:18px; font-weight:700; margin-bottom:15px; letter-spacing:0.5px;">Diese Woche</div>
            <div id="week-grid" style="display: flex; justify-content: space-between; gap: 5px;">
                <!-- JS Generated -->
            </div>
        </div>

        <!-- Workout Card -->
        <div class="carbon-card" style="padding: 20px; display:flex; flex-direction:column; position: relative;">
            <div id="wo-header" style="font-size:18px; font-weight:700; margin-bottom:10px; letter-spacing:0.5px;">Heutiges Training</div>
            
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px;">
                <div>
                    <div id="wo-title" style="font-size: 24px; font-weight: 800; margin-bottom: 4px; line-height: 1.2;">Lower Body</div>
                    <div id="wo-desc" style="font-size: 15px; color: var(--text-mute);">1:10h, 6 Übungen</div>
                </div>
                
                <!-- Rig Image -->
                <img id="wo-img" src="img/lower_body.png" class="rig-image">
            </div>

            <!-- Start Button Group -->
            <div style="margin-top: 10px;">
                <button id="btn-start" class="start-btn">Starten</button>
            </div>
        </div>
        
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
        <a href="workouts.html" class="nav-icon active"><i class="fa-solid fa-dumbbell"></i></a>
        <a href="nutrition.html" class="nav-icon"><i class="fa-solid fa-utensils"></i></a>
        <a href="profile.html" class="nav-icon"><i class="fa-regular fa-user"></i></a>
    </div>

    <script>
        const DAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
        const FULL_DAYS = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
        
        let selectedDayIndex = -1; // 0-6 (Mon-Sun)
        let todayIndex = -1;

        // Mock Data Schedule
        // 0=Mon, 1=Tue, ...
        const SCHEDULE = [
            { type: 'lower', title: 'Lower Body', desc: '1:10h, 6 Übungen', img: 'img/lower_body.png' }, // Mo
            { type: 'upper', title: 'Upper Body', desc: '1:15h, 7 Übungen', img: 'img/upper_body.png' }, // Di
            { type: 'off', title: 'Offday', desc: 'Regeneriere dich', img: 'img/rest.png' },            // Mi
            { type: 'lower', title: 'Lower Body', desc: '1:10h, 6 Übungen', img: 'img/lower_body.png' }, // Do
            { type: 'full', title: 'Ganzkörper', desc: '1:20h, 9 Übungen', img: 'img/full_body.png' },  // Fr
            { type: 'off', title: 'Offday', desc: 'Aktive Erholung', img: 'img/rest.png' },             // Sa
            { type: 'off', title: 'Offday', desc: 'Regeneriere dich', img: 'img/rest.png' }             // So
        ];

        document.addEventListener('DOMContentLoaded', () => {
            initWeek();
        });

        function initWeek() {
            // Determine Today (Mon=0...Sun=6)
            const d = new Date();
            let day = d.getDay(); // 0=Sun, 1=Mon
            todayIndex = (day === 0) ? 6 : day - 1;
            
            // Default selection = today
            selectedDayIndex = todayIndex;

            renderWeek();
            renderWorkout();
        }

        function renderWeek() {
            const container = document.getElementById('week-grid');
            if(!container) return;
            container.innerHTML = '';
            
            // Get workout days settings
            let workoutDays = ['Mo', 'Mi', 'Fr', 'So']; // Default
            try {
                const stored = localStorage.getItem('kellerGymData');
                if(stored) {
                    const data = JSON.parse(stored);
                    if(data.days && data.days.length > 0) workoutDays = data.days;
                }
            } catch(e) { console.error(e); }

            DAYS.forEach((label, idx) => {
                const isToday = (idx === todayIndex);
                const isSelected = (idx === selectedDayIndex);
                const isWorkout = workoutDays.includes(label);

                // Create Column Structure
                const col = document.createElement('div');
                col.className = 'week-day-col';
                
                // Add active/selected classes
                if (isToday) col.classList.add('day-active'); // Shimmer 
                if (isSelected) col.classList.add('selected'); // Interaction state

                col.onclick = () => {
                    selectedDayIndex = idx;
                    renderWeek();
                    renderWorkout();
                };
                
                // Circle Icon
                const circle = document.createElement('div');
                circle.style.width = '30px';
                circle.style.height = '30px';
                circle.style.borderRadius = '50%';
                circle.style.display = 'flex';
                circle.style.alignItems = 'center';
                circle.style.justifyContent = 'center';
                
                if(isWorkout) {
                    circle.style.border = '2px solid var(--primary)';
                    circle.style.background = 'rgba(0, 255, 204, 0.1)';
                    // Biceps Image
                    circle.innerHTML = `<img src="img/biceps_2.png" style="width: 18px; height: 18px; object-fit: contain;">`;
                } else {
                    circle.style.border = '1px solid transparent';
                    circle.style.background = '#2a2d35';
                    circle.innerHTML = '<i class="fa-solid fa-couch" style="color:#555; font-size:14px;"></i>';
                }

                // Label
                const labelDiv = document.createElement('div');
                labelDiv.innerText = label;
                labelDiv.style.fontSize = '12px';
                labelDiv.style.fontWeight = '600';
                // Highlight text if today or selected
                labelDiv.style.color = (isToday || isSelected) ? '#fff' : 'var(--text-mute)';

                col.appendChild(circle);
                col.appendChild(labelDiv);

                container.appendChild(col);
            });
        }

        function renderWorkout() {
            const entry = SCHEDULE[selectedDayIndex];
            
            // Text Elements
            const titleEl = document.getElementById('wo-title');
            const descEl = document.getElementById('wo-desc');
            const imgEl = document.getElementById('wo-img');
            const headerEl = document.getElementById('wo-header');
            const btnEl = document.getElementById('btn-start');

            // Set Content
            titleEl.innerText = entry.title;
            descEl.innerText = entry.desc;
            imgEl.src = entry.img;

            // Header Logic
            if(selectedDayIndex === todayIndex) {
                headerEl.innerText = "Heutiges Training";
                btnEl.disabled = false;
                btnEl.classList.remove('disabled');
                
                if(entry.type === 'off') {
                    btnEl.style.display = 'none'; // Optional: Can also hide if Rest day
                } else {
                    btnEl.style.display = 'inline-block';
                }
            } else {
                headerEl.innerText = "Training am " + FULL_DAYS[selectedDayIndex];
                // Instead of hiding, we disable it
                btnEl.style.display = 'inline-block';
                btnEl.disabled = true;
                btnEl.classList.add('disabled');
            }
        }
    </script>
</body>
</html>
