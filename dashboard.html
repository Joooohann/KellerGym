<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KellerGym - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_dashboard.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    <style>
        /* Dashboard specific overrides if needed */
        body { height: 100dvh; } /* Fix mobile viewports */
        #app-viewport { padding-bottom: 90px !important; }
        
        #screen-home { padding-bottom: 20px !important; }

        .simple-card {
            background-color: #15161A;
            border-radius: 24px;
            /* No carbon stripe */
        }
        
        /* History Dots Grid */
        .history-grid {
            display: grid;
            grid-template-columns: repeat(7, 12px); /* Slightly smaller dots */
            justify-content: center; /* Horizontally centered */
            gap: 7px 9px; /* adj gap to fit 7 cols */
            margin-top: 15px;
        }
        .h-dot {
            width: 100%;
            aspect-ratio: 1; /* Square */
            border-radius: 3px; /* Smaller radius */
            background-color: #333;
        }
        .h-dot.green { background-color: var(--primary); }
        .h-dot.orange { background-color: #ffaa00; }
        .h-dot.black { background-color: #252525; border: 1px solid #333; }
        .h-dot.grey { background-color: #444; }

        /* Day Active Shimmer */
        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-20deg); }
            100% { transform: translateX(200%) skewX(-20deg); } /* Move across quickly */
        }
        .day-active {
            border-color: var(--primary) !important;
            background-color: rgba(0, 255, 204, 0.1);
            position: relative;
            overflow: hidden !important; /* Keep simmer inside */
        }
        .day-active::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-20deg) translateX(-150%);
            animation: shimmer 3s infinite; /* 3s cycle */
            pointer-events: none;
        }

        /* Responsive Rig Image */
        .rig-image {
            position: absolute; 
            right: 130px; 
            bottom: 8px; 
            height: 110px; 
            width: auto; 
            object-fit: contain;
        }
        
        @media (max-width: 600px) {
            .rig-image {
                right: 20px; /* Closer to edge on mobile */
            }
        }

        /* Ambient Background Glow 1: Von oben mittig auslaufend */
        body {
            background: var(--bg-body) radial-gradient(circle at 50% -10%, rgba(0, 128, 128, 0.4) 0%, rgba(8, 9, 12, 0) 60%) no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        
        <!-- DASHBOARD HOME -->
        <div id="screen-home" class="screen active" style="display:block !important; opacity:1; height: auto !important; min-height: 100%; padding-bottom: 150px;">
            <div class="header-row" style="position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; margin-top: 10px;">
                <!-- KELLERGYM Title (Centered) -->
                <h1 style="font-size: 32px; margin: 0; line-height: 1; font-weight: 400; font-family: 'Black Ops One', cursive;">Keller<span style="color: var(--primary);">Gym</span></h1>
                
                <!-- Icons (Absolute Right) -->
                <div style="position: absolute; right: 0; top: 50%; transform: translateY(-50%); display:flex; gap:15px; align-items:center;">
                   <div style="width:40px; height:40px; border-radius:50%; overflow: hidden; border: 1px solid #333; position: relative;">
                        <!-- Spinner Background -->
                        <i id="header-profile-spinner" class="fa-solid fa-circle-notch fa-spin" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--primary); font-size: 16px;"></i>
                        <img id="header-profile-img" src="img/profile.jpg" alt="Profile" style="width: 100%; height: 100%; object-fit: cover; display: block; position: relative; z-index: 2; opacity: 0; transition: opacity 0.3s ease;">
                   </div>
                </div>
            </div>

            <!-- Training Card (Toggle Today/Tomorrow) -->
            <div class="carbon-card" onclick="toggleTrainingView()" style="padding: 20px; margin-bottom: 25px; cursor: pointer; position: relative;">
                
                <div style="font-size:18px; font-weight:700; margin-bottom:15px; letter-spacing:0.5px; color:var(--primary);" id="training-header">
                    <span style="color:var(--primary)">Heutiges Training</span>
                </div>
                
                <!-- Link Arrow -->
                <a href="workouts.html" onclick="event.stopPropagation();" style="position: absolute; top: 0; right: 0; padding: 20px; color: var(--text-mute); font-size: 14px; text-decoration: none; z-index: 10;">
                    <i class="fa-solid fa-chevron-right"></i>
                </a>

                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div id="daily-train-title" style="font-size: 22px; font-weight: 800; margin-bottom: 5px;">Lower Body</div>
                        <div id="daily-train-desc" style="font-size: 15px; color: var(--text-mute);">1:10h, 6 Übungen</div>
                    </div>
                    
                    <!-- Rig Image -->
                    <img src="img/lower_body.png" class="rig-image" id="training-img">

                <!-- Dots (2 states) -->
                <div style="display: flex; gap: 5px; margin-top: 15px; justify-content: center;">
                    <div class="n-dot active" id="td-1"></div>
                    <div class="n-dot" id="td-2"></div>
                </div>
            </div>

            <!-- Training Week Section -->
            <div style="margin-bottom: 25px;">
                <div class="simple-card" onclick="window.location.href='workouts.html'" style="cursor: pointer; padding: 15px; display: flex; flex-direction: column; gap: 10px; position:relative;">
                    <div style="font-size:18px; font-weight:700; margin-bottom:5px;">Deine Trainingswoche</div>
                    
                    <!-- Link Arrow -->
                    <a href="workouts.html" onclick="event.stopPropagation();" style="position: absolute; top: 15px; right: 15px; color: var(--text-mute); font-size: 14px; text-decoration: none;">
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>

                    <div style="overflow-x: auto; display: flex; justify-content: space-between; gap: 7px;">
                        <!-- Circles generated by JS -->
                        <div id="week-overview" style="display: contents;"></div>
                    </div>
                </div>
            </div>

            <!-- Quote & Nutrition Grid -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
                
                <!-- Quote (Motivationsspruch) -->
                <div id="section-quote" class="simple-card" style="padding: 15px; display: flex; flex-direction: column; justify-content: space-between; height: 160px;">
                    <div>
                        <div style="font-size:17px; font-weight:700; margin-bottom:10px;">Motivationsspruch</div>
                        <div id="quote-content" style="font-size:20px; font-weight: 600; line-height: 1.3; color: var(--primary);">
                            &quot;Muss nicht schmecke, muss wirke.&quot;

                    </div>

                    </div>

                <!-- Nutrition (Ernährung) -->
                <div class="simple-card" id="nutri-card" onclick="toggleNutritionView()" style="padding: 15px; height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; cursor: pointer;">
                    <div style="width: 100%; text-align: left; font-size:17px; font-weight:700;">Ernährung</div>
                    
                    <!-- Link Arrow -->
                    <a href="nutrition.html" onclick="event.stopPropagation();" style="position: absolute; top: 15px; right: 15px; color: var(--text-mute); font-size: 14px; text-decoration: none;">

                    </a>
                    
                    <!-- Gauge Area -->
                    <div style="position: relative; width: 100px; height: 60px; margin-top: 5px;">
                         <!-- SVG Gauge -->
                         <svg viewBox="0 0 100 60" style="width: 100px; height: 60px; overflow: visible;">
                            <!-- Gradient Def -->
                            <defs>
                                <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
                                    <stop offset="50%" style="stop-color:#ffcc00;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#66ff66;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <!-- Background Track - Thicker (12) -->
                            <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#333" stroke-width="12" stroke-linecap="round" />
                            <!-- Colored Value Track (gradient) - Thicker (12) -->
                            <path id="gauge-path" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="url(#gaugeGrad)" stroke-width="12" stroke-linecap="round" stroke-dasharray="125" stroke-dashoffset="60" style="transition: stroke-dashoffset 0.8s ease-out;" /> 
                            
                            <!-- Knob/Pointer Group for Rotation -->
                            <g id="gauge-knob-group" style="transition: transform 0.8s ease-out; transform-origin: 50px 50px; transform: rotate(0deg);">
                                <circle cx="50" cy="10" r="8" fill="#1c1e24" stroke="var(--primary)" stroke-width="3" /> 
                            </g>
                         </svg>
                         
                         <!-- Value Text Centered -->
                         <div style="position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); text-align: center; width: 100%;">
                             <div style="font-size: 16px; font-weight: 800; line-height: 1;" id="nutri-val">--</div>
                             <div style="font-size: 10px; color: #888;" id="nutri-max">/ --</div>

                    </div>
                    
                    <!-- Labels / Type -->
                    <div style="font-size: 14px; font-weight: 600; color: var(--text-mute); margin-top: 5px;" id="nutri-label">Kalorien</div>

                    <!-- Dots -->
                    <div style="display: flex; gap: 5px; margin-top: 5px;">
                        <div class="n-dot active" id="nd-1"></div>
                        <div class="n-dot" id="nd-2"></div>
                        <div class="n-dot" id="nd-3"></div>
                    </div>
                </div>

            </div>

             <!-- NEW SECTION: Gewicht / Training History & Wasser -->
             <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
                
                <!-- Wasser -->
                <div id="section-water" class="simple-card" style="padding: 10px; display: flex; flex-direction: column; justify-content: space-between; min-height: 120px; background: #15161A;"> 
                    <div style="font-size:16px; font-weight:700; margin-bottom:2px;">Wasser</div>
                    
                    <!-- Glass Visual & Total -->
                    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; position:relative;">
                        <div style="font-size:14px; font-weight:800; color:#fff;" id="water-total">0.0 L</div>
                        
                        <!-- Example Glass -->
                        <div style="width:30px; height:45px; border:2px solid rgba(255,255,255,0.3); border-top:none; border-radius:0 0 8px 8px; position:relative; overflow:hidden; background:rgba(255,255,255,0.05);">
                            <div id="water-fill" style="position:absolute; bottom:0; left:0; right:0; height:0%; background:rgb(69, 163, 226); transition: height 0.3s ease;"></div>
                        </div>
                    </div>

                    <!-- Controls -->
                    <div style="position: relative; display:flex; align-items:center; justify-content:center; gap:4px; margin-top:4px; background:#222; border-radius:12px; padding:2px; align-self: center; width: 100%; box-sizing: border-box;">
                        <button onclick="updateWater(-1)" style="width:32px; height:32px; border-radius:50%; border:none; background:#333; color:#fff; cursor:pointer; font-size:18px; flex-shrink: 0;">-</button>
                        
                        <!-- Dropdown Selector -->
                         <div onclick="toggleWaterMenu()" style="font-size:16px; font-weight:700; color:#fff; cursor:pointer; display:flex; align-items:center; gap:2px; justify-content: center; user-select: none; flex-grow: 1;">
                            <span id="water-increment-val">100ml</span>
                            <i class="fa-solid fa-chevron-down" style="font-size:10px; color:#aaa;"></i>
                        </div>

                         <!-- Dropdown Menu -->
                        <div id="water-menu" style="display:none; position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:#333; border-radius:8px; padding:5px; z-index:10; box-shadow:0 4px 10px rgba(0,0,0,0.5); min-width: 80px; margin-bottom: 8px;">
                            <div onclick="setWaterIncrement(100)" style="padding:8px; text-align:center; border-bottom:1px solid #444; font-size:14px; color:#ddd; cursor:pointer;">100ml</div>
                            <div onclick="setWaterIncrement(200)" style="padding:8px; text-align:center; border-bottom:1px solid #444; font-size:14px; color:#ddd; cursor:pointer;">200ml</div>
                            <div onclick="setWaterIncrement(250)" style="padding:8px; text-align:center; border-bottom:1px solid #444; font-size:14px; color:#ddd; cursor:pointer;">250ml</div>

                    <div style="font-size:12px; color: var(--text-mute); margin-bottom: 5px;">Letzte 30 Tage</div>
                    
                    <!-- Link Arrow (Shows dynamically based on mode) -->

            <!-- Sleep Section -->

                <div style="font-size:18px; font-weight:700; margin-bottom:5px;">Schlaf</div>
                
                <!-- Link Arrow -->
                <a href="#" style="position: absolute; top: 15px; right: 15px; color: var(--text-mute); font-size: 14px; text-decoration: none;">
                    <i class="fa-solid fa-chevron-right"></i>
                </a>

                <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                    <div style="font-size:28px; font-weight: 800; color: #fff;">
                        9<span style="font-size:16px; color:var(--text-mute);">h</span> 
                        20<span style="font-size:16px; color:var(--text-mute);">min</span>
                    </div>
                    <div style="font-size:12px; font-weight:600; color: #666; background:#222; padding:4px 8px; border-radius:6px;">
                        Heutiger Schlaf
                    </div>
                </div>
                
                <div style="font-size:12px; color: var(--text-mute); margin-bottom: 5px;">Letzte 7 Tage</div>

                <div id="sleep-chart" style="display: flex; justify-content: space-between; align-items: flex-end; height: 50px; gap: 4px;">
                    <!-- JS generated -->
                </div>
            </div>

        </div> <!-- End Screen Home -->
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-icon active"><i class="fa-solid fa-house"></i></a>
        <a href="workouts.html" class="nav-icon"><i class="fa-solid fa-dumbbell"></i></a>
        <a href="nutrition.html" class="nav-icon"><i class="fa-solid fa-utensils"></i></a>
        <a href="profile.html" class="nav-icon" id="nav-profile-icon"><i class="fa-regular fa-user"></i></a>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check for test mode flag and color the profile icon
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('devmode') === 'true') {
                const profileIcon = document.getElementById('nav-profile-icon');
                if (profileIcon) {
                    profileIcon.style.color = 'var(--primary)';
                }
            }
        });
        const DAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
        
        // Nutrition Logic
        let currentNutriMode = 0; // 0=Cal, 1=Prot, 2=Carb
        
        const NUTRI_DEFAULTS = [
            { label: 'Kalorien', max: 3500, current: 800, colorStart: '#ff4444', colorEnd: '#66ff66' },
            { label: 'Eiweiß', max: 160, current: 140, colorStart: '#4444ff', colorEnd: '#88ccff' },
            { label: 'Kohlenhydrate', max: 400, current: 170, colorStart: '#ffaa00', colorEnd: '#ffff44' }
        ];

        let nutriData = [...NUTRI_DEFAULTS];
        let lastGaugePercentage = 0;
        let gaugeAnimationId = null;

        function toggleNutritionView() {
            currentNutriMode = (currentNutriMode + 1) % 3;
            renderNutrition();
        }

        function renderNutrition() {
            const mode = nutriData[currentNutriMode];
            
            // Text Updates
            document.getElementById('nutri-label').innerText = mode.label;
            document.getElementById('nutri-val').innerText = mode.current;
            document.getElementById('nutri-max').innerText = '/ ' + mode.max;
            
            // Active Dot
            document.getElementById('nd-1').classList.toggle('active', currentNutriMode === 0);
            document.getElementById('nd-2').classList.toggle('active', currentNutriMode === 1);
            document.getElementById('nd-3').classList.toggle('active', currentNutriMode === 2);

            // Target Percentage
            const percentage = Math.min(Math.max(mode.current / mode.max, 0), 1); // Clamp 0-1
            
            // Stop logic: If we are already animating, cancel it
            if(gaugeAnimationId) cancelAnimationFrame(gaugeAnimationId);
            
            // Start Animation from last known pos to new target
            animateGauge(lastGaugePercentage, percentage, 800);
            
            // Update last pos
            lastGaugePercentage = percentage;
        }

        function animateGauge(start, end, duration) {
            const startTime = performance.now();
            const range = end - start;
            
            // Ensure elements exist
            const pathEl = document.getElementById('gauge-path');
            const knobGroup = document.getElementById('gauge-knob-group');
            const knobCircle = document.querySelector('#gauge-knob-group circle');
            
            if(!pathEl || !knobGroup) return;

            // Important: Disable transition during animation to prevent conflict
            pathEl.style.transition = 'none';
            knobGroup.style.transition = 'none';

            function step(currentTime) {
                const elapsed = currentTime - startTime;
                let progress = Math.min(elapsed / duration, 1);
                if (duration === 0) progress = 1;
                
                // Ease Out Cubic
                const ease = 1 - Math.pow(1 - progress, 3); 
                
                const currentPct = start + (range * ease);
                
                // Update DOM
                const maxDash = 125;
                const offset = maxDash - (maxDash * currentPct);
                pathEl.style.strokeDashoffset = offset;
                
                const rotation = -90 + (180 * currentPct);
                knobGroup.style.transform = `rotate(${rotation}deg)`;
                
                // Color Interpolation based on currentPct (Position on Bar)
                const c1 = "#ff4444";
                const c2 = "#ffcc00";
                const c3 = "#66ff66";
                let currentColor;
                
                let cp = Math.min(Math.max(currentPct, 0), 1);
                
                if(cp < 0.5) {
                    currentColor = interpolateColor(c1, c2, cp * 2);
                } else {
                    currentColor = interpolateColor(c2, c3, (cp - 0.5) * 2);
                }
                
                if(knobCircle) {
                    knobCircle.setAttribute('fill', currentColor);
                    knobCircle.setAttribute('stroke', '#333'); 
                    knobCircle.setAttribute('stroke-width', '3'); 
                }

                if(progress < 1) {
                    gaugeAnimationId = requestAnimationFrame(step);
                } else {
                    gaugeAnimationId = null;
                }
            }
            
            gaugeAnimationId = requestAnimationFrame(step);
        }
        
        // Helper for colors
        function interpolateColor(color1, color2, factor) {
             function hexToRgb(hex) {
                var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : {r:0, g:0, b:0};
            }
             
             if (factor > 1) factor = 1;
             if (factor < 0) factor = 0;
            
             const c1 = hexToRgb(color1);
             const c2 = hexToRgb(color2);

             const r = Math.round(c1.r + factor * (c2.r - c1.r));
             const g = Math.round(c1.g + factor * (c2.g - c1.g));
             const b = Math.round(c1.b + factor * (c2.b - c1.b));
             
             return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function renderWeek() {
            const container = document.getElementById('week-overview');
            if(!container) return;
            container.innerHTML = '';
            
            // Get today's index (0=Sun, 1=Mon in JS, but we want 0=Mon)
            let todayObj = new Date();
            let todayDate = todayObj.getDay(); 
            let todayIndex = (todayDate === 0) ? 6 : todayDate - 1; // Normalize: Mon=0 ... Sun=6
            
            // Check workout days from storage or defaults
            let workoutDays = ['Mo', 'Mi', 'Fr', 'So']; // Default
            
            if(window.obData && window.obData.days && window.obData.days.length > 0) {
               workoutDays = window.obData.days;
            }

            DAYS.forEach((day, index) => {
                const isToday = (index === todayIndex);
                const isWorkout = workoutDays.includes(day);
                
                // Outer column
                const col = document.createElement('div');
                col.className = 'week-day-col';
                col.style.display = 'flex';
                col.style.flexDirection = 'column';
                col.style.alignItems = 'center';
                col.style.gap = '5px';
                
                col.style.border = '2px solid transparent'; // base border
                col.style.borderRadius = '16px';
                col.style.padding = '4px'; 
                col.style.transition = '0.3s';
                col.style.minWidth = '40px'; 

                if(isToday) {
                    col.classList.add('day-active'); // Use class for shimmer
                }

                // Circle (30x30)
                const circle = document.createElement('div');
                circle.style.width = '30px';
                circle.style.height = '30px';
                circle.style.borderRadius = '50%';
                circle.style.display = 'flex';
                circle.style.alignItems = 'center';
                circle.style.justifyContent = 'center';
                
                if(isWorkout) {
                    circle.style.border = '2px solid var(--primary)';
                    circle.style.background = 'rgba(0, 255, 204, 0.1)';
                    // Biceps Image
                    circle.innerHTML = `<img src="img/biceps_2.png" style="width: 18px; height: 18px; object-fit: contain;">`;
                } else {
                    circle.style.border = '1px solid transparent';
                    circle.style.background = '#2a2d35';
                    circle.innerHTML = '<i class="fa-solid fa-couch" style="color:#555; font-size:14px;"></i>';
                }

                // Label
                const label = document.createElement('div');
                label.style.fontSize = '12px';
                label.style.fontWeight = '600';
                label.innerText = day;
                
                if(isToday) {
                    label.style.color = 'var(--primary)';
                } else {
                    label.style.color = 'var(--text-mute)';
                }
                
                col.appendChild(circle);
                col.appendChild(label);
                container.appendChild(col);
            });
        }

        function renderHistory() {
            const container = document.getElementById('hist-grid');
            const titleEl = document.getElementById('hist-title');
            const arrowEl = document.getElementById('hist-arrow');
            const d1 = document.getElementById('hd-1');
            const d2 = document.getElementById('hd-2');
            
            if(!container) return;
            container.innerHTML = '';
            
            // Mode 0 = Weight, 1 = Training
            if(currentHistoryMode === 0) {
                if(titleEl) titleEl.textContent = 'Gewicht';
                if(arrowEl) {
                    arrowEl.style.display = 'block';
                    arrowEl.href = 'profile.html';
                }
                if(d1) d1.classList.add('active');
                if(d2) d2.classList.remove('active');
            } else {
                if(titleEl) titleEl.textContent = 'Training';
                if(arrowEl) {
                    arrowEl.style.display = 'block';
                    arrowEl.href = 'workouts.html';
                }
                if(d1) d1.classList.remove('active');
                if(d2) d2.classList.add('active');
            }

            // Generate 30 days dummy data
            for(let i=0; i<30; i++) {
                const dot = document.createElement('div');
                dot.className = 'h-dot';
                
                if(currentHistoryMode === 0) {
                   // Weight Logic
                   if(Math.random() > 0.3) dot.classList.add('green');
                   else dot.classList.add('grey');
                } else {
                   // Training Logic
                   const r = Math.random();
                   if(r > 0.6) dot.classList.add('orange');
                   else if (r > 0.3) dot.classList.add('grey');
                   else dot.classList.add('black');
                }
                container.appendChild(dot);
            }
        }
        
        let currentHistoryMode = 0;
        function toggleHistoryView() {
            currentHistoryMode = (currentHistoryMode + 1) % 2;
            renderHistory();
        }
        
        // Water Logic
        let waterAmount = 0; // ml
        let waterGoal = 1800; // ml
        let waterIncrement = 100; // default

        function toggleWaterMenu() {
            const menu = document.getElementById('water-menu');
            if(menu) {
                // simple toggle
                if(menu.style.display === 'block') {
                    menu.style.display = 'none';
                } else {
                    menu.style.display = 'block';
                }
            }
        }

        function setWaterIncrement(val) {
            waterIncrement = val;
            const label = document.getElementById('water-increment-val');
            if(label) label.innerText = val + 'ml';
            toggleWaterMenu(); // Close menu
        }

        // Sleep Logic
        function renderSleep() {
             const container = document.getElementById('sleep-chart');
             if(!container) return;
             container.innerHTML = '';
             
             const daysShort = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
             const today = new Date();
             
             // Generate last 7 days (Past -> Today)
             for(let i=6; i>=0; i--) {
                 const d = new Date();
                 d.setDate(today.getDate() - i);
                 
                 const dayName = daysShort[d.getDay()];
                 const isToday = (i === 0);
                 
                 // Random height for demo 30-80%
                 let height = Math.floor(Math.random() * 50) + 30;
                 if(isToday) height = 90; // Fixed high for today
                 
                 const col = document.createElement('div');
                 col.style.flex = "1";
                 col.style.display = "flex";
                 col.style.flexDirection = "column";
                 col.style.alignItems = "center";
                 col.style.gap = "3px";
                 col.style.height = "100%";
                 col.style.justifyContent = "flex-end";
                 
                 const bar = document.createElement('div');
                 bar.style.width = "14px";
                 bar.style.height = height + "%";
                 bar.style.borderRadius = "4px";
                 
                 const label = document.createElement('div');
                 label.style.fontSize = "9px";
                 label.innerText = dayName;
                 
                 if(isToday) {
                     bar.style.background = "linear-gradient(to top, var(--primary), #88ffcc)";
                     bar.style.boxShadow = "0 0 10px rgba(0,255,180,0.3)";
                     label.style.color = "var(--primary)";
                     label.style.fontWeight = "bold";
                 } else {
                     bar.style.background = (i % 2 === 0) ? "#2a2d35" : "#3a3d45";
                     label.style.color = "#555";
                 }
                 
                 col.appendChild(bar);
                 col.appendChild(label);
                 container.appendChild(col);
             }
        }
        
        let trainingState = 0; // 0: Today (Lower), 1: Tomorrow (Off)
        function toggleTrainingView() {
            trainingState = (trainingState + 1) % 2; // Toggle between 0 and 1
            
            const header = document.getElementById('training-header');
            const title = document.getElementById('daily-train-title');
            const desc = document.getElementById('daily-train-desc');
            const img = document.getElementById('training-img');
            const dot1 = document.getElementById('td-1');
            const dot2 = document.getElementById('td-2');

            // Reset dots
            if(dot1) dot1.classList.remove('active');
            if(dot2) dot2.classList.remove('active');

            if(trainingState === 0) {
                // Today: Lower Body
                if(header) header.innerHTML = '<span style="color:var(--primary)">Heutiges Training</span>';
                if(title) title.innerText = 'Lower Body';
                if(desc) desc.innerText = '1:10h, 6 Übungen';
                if(img) img.src = 'img/lower_body.png';
                if(dot1) dot1.classList.add('active');
            } else {
                 // Tomorrow: Restday
                if(header) header.innerHTML = '<span style="color:var(--primary)">Morgiges Training</span>';
                if(title) title.innerText = 'Restday';
                if(desc) desc.innerText = 'Regeneriere dich';
                if(img) img.src = 'img/rest.png';
                if(dot2) dot2.classList.add('active');
            }
        }

        function initQuote() {
             const quotes = [
                 { text: '"Muss nicht schmecke, muss wirke."', author: "~ Rühl, 2025" },
                 { text: '"Hauptsache schwer und falsch"', author: "~ Rühl, 2024" }
             ];
             const idx = Math.floor(Math.random() * quotes.length);
             const q = quotes[idx];
             
             const qc = document.getElementById('quote-content');
             const qa = document.getElementById('quote-author');
             
             if(qc) qc.innerText = q.text;
             if(qa) qa.innerText = q.author;
        }

        // Expose functions for Supabase Sync
        window.setWaterAmount = (val) => { waterAmount = val; renderWater(); };
        window.setWaterGoal = (val) => { waterGoal = val; renderWater(); };

        function updateWater(direction) {
            waterAmount += (direction * waterIncrement);
            if(waterAmount < 0) waterAmount = 0;
            renderWater();
            document.dispatchEvent(new CustomEvent('waterUpdated', { detail: waterAmount }));
        }

        function renderWater() {
             const totalEl = document.getElementById('water-total');
             const fillEl = document.getElementById('water-fill');
             if(!totalEl || !fillEl) return;
             
             // Convert to L and show goal
             const amountL = (waterAmount / 1000).toFixed(1);
             const goalL = (waterGoal / 1000).toFixed(1);
             totalEl.textContent = amountL + ' / ' + goalL + ' L';

             // Optische Füllung des Glases berechnen
             const percent = Math.min((waterAmount / waterGoal) * 100, 100) || 0;
             fillEl.style.height = percent + '%';
        }

        // Inline script to init dashboard specific logic
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Load Profile Data
            const savedData = localStorage.getItem('kellerGymData');
            if(savedData) {
                try {
                    window.obData = JSON.parse(savedData);
                    // Profilbild extrem schnell vorladen, um Blitzen zu vermeiden
                    if (window.obData.profileImage) {
                        const headerImg = document.getElementById('header-profile-img');
                        if (headerImg) {
                            headerImg.src = window.obData.profileImage;
                            headerImg.style.opacity = '1'; // Sofort einblenden
                        }
                    }
                } catch(e) {
                    console.error("Error parsing data", e);
                    window.obData = {};
                }
            } else {
                window.obData = {}; 
            }

            // 2. Load Settings
            const savedSettings = localStorage.getItem('kellerGymSettings');
            if (savedSettings) {
                try {
                    const settings = JSON.parse(savedSettings);
                    
                    // Sleep
                    if (settings.sleepTracking === false) {
                        const sleepSection = document.getElementById('section-sleep');
                        if (sleepSection) sleepSection.style.display = 'none';
                    }

                    // Scroll Padding (Always apply)
                    if(settings.scrollPad !== undefined) {
                        const screen = document.getElementById('screen-home');
                        if(screen) screen.style.setProperty('--dash-pad', settings.scrollPad + 'px');
                    }
                    
                } catch (e) {
                    console.error("Error parsing settings", e);
                }
            }
            
            // Render
            renderWeek();
            renderNutrition();
            renderHistory();
            renderSleep();
            initQuote();
            renderWater(); // Ensure water is rendered
        });
    </script>
    <script type="module">
        import { supabase } from './supabase-config.js';

        // --- Supabase Water Sync Logic ---
        function getLocalTodayStr() {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // Use local timezone date instead of UTC
        let todayStr = getLocalTodayStr();
        let userId = null;

        // Debounce timer for updates
        let syncTimeout = null;

        async function initWaterBase() {
            const { data: { user } } = await supabase.auth.getUser();
            if(!user) return;
            userId = user.id;

            // 1. Profil-Infos (Wasser-Ziel & Profilbild) holen
            const { data: profile, error: profileErr } = await supabase
                .from('user_profiles')
                .select('water_goal_ml, profile_image')
                .eq('user_id', userId)
                .maybeSingle();

            if (profileErr) {
                console.error("Fehler beim Laden des Profils (Dashboard):", profileErr);
            }

            if (profile) {
                // Wasser Ziel setzen
                if (profile.water_goal_ml) {
                    if(window.setWaterGoal) window.setWaterGoal(profile.water_goal_ml);
                }
                // Profilbild im Header setzen
                if (profile.profile_image) {
                    const headerImg = document.getElementById('header-profile-img');
                    if (headerImg) {
                        headerImg.src = profile.profile_image;
                        headerImg.style.opacity = '1';
                    }
                } else {
                    // Fallback, falls gar kein Bild existiert
                    const headerImg = document.getElementById('header-profile-img');
                    if (headerImg) {
                        headerImg.style.opacity = '1';
                    }
                }
            }

            // 2. Heutigen Wasser-Log holen oder erstellen
            const { data: waterLog, error } = await supabase
                .from('water_logs')
                .select('*')
                .eq('user_id', userId)
                .eq('date', todayStr)
                .maybeSingle();

            if (waterLog) {
                // Es gibt schon einen, lade den Wert ins UI
                if(window.setWaterAmount) window.setWaterAmount(waterLog.amount_ml);
            } else {
                // Es gibt keinen, lege einen neuen mit 0ml in der DB an
                const { error: insertError } = await supabase.from('water_logs').insert([{
                    user_id: userId,
                    date: todayStr,
                    amount_ml: 0
                }]);
                
                if(insertError) {
                    console.error("Water Insert Error:", insertError);
                    alert("Wasser konnte nicht initialisiert werden: " + insertError.message);
                } else {
                    console.log("Neuer Wasser-Log für heute erstellt!");
                }
                
                if(window.setWaterAmount) window.setWaterAmount(0);
            }
        }

        document.addEventListener('waterUpdated', (e) => {
            if (!userId) return;
            const newAmount = e.detail;
            
            // Debouncing: 600ms warten, bevor wir es in die Cloud jagen,
            // damit schnelles Klick-Spamming nicht 10 DB-Requests auslöst
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                const { error } = await supabase
                    .from('water_logs')
                    .update({ amount_ml: newAmount })
                    .eq('user_id', userId)
                    .eq('date', todayStr);
                
                if(error) {
                    console.error("Water Sync Error:", error);
                    alert("Wasser konnte nicht geupdatet werden: " + error.message);
                } else {
                    console.log("Wasser in Cloud gespeichert:", newAmount, "ml");
                }
            }, 600);
        });

        // Initialize when script loads
        initWaterBase();
    </script>
