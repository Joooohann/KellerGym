<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KellerGym - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_dashboard.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    <style>
        /* Dashboard specific overrides if needed */
        body { height: 100dvh; } /* Fix mobile viewports */
        #app-viewport { padding-bottom: 90px !important; }
        
        #screen-home { padding-bottom: 20px !important; }

        .simple-card {
            background-color: #15161A;
            border-radius: 24px;
            /* No carbon stripe */
        }
        .carbon-card {
            min-height: 120px;
            background-color: #15161A;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .carbon-card .rig-image {
            min-height: 80px;
            min-width: 80px;
        }
        #daily-train-title {
            min-height: 28px;
            display: flex;
            align-items: center;
            transition: opacity 0.5s;
            will-change: opacity;
            pointer-events: auto;
            opacity: 1;
        }
        #daily-train-desc {
            min-height: 20px;
            display: flex;
            align-items: center;
            transition: opacity 0.5s;
            will-change: opacity;
            pointer-events: auto;
            opacity: 1;
        }
        
        /* History Dots Grid */
        .history-grid {
            display: grid;
            grid-template-columns: repeat(7, 12px); /* Slightly smaller dots */
            justify-content: center; /* Horizontally centered */
            gap: 7px 9px; /* adj gap to fit 7 cols */
            margin-top: 15px;
        }
        .h-dot {
            width: 100%;
            aspect-ratio: 1; /* Square */
            border-radius: 3px; /* Smaller radius */
            background-color: #333;
        }
        .h-dot.green { background-color: var(--primary); }
        .h-dot.orange { background-color: #ffaa00; }
        .h-dot.black { background-color: #252525; border: 1px solid #333; }
        .h-dot.grey { background-color: #444; }

        /* Day Active Shimmer */
        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-20deg); }
            100% { transform: translateX(200%) skewX(-20deg); } /* Move across quickly */
        }
        .day-active {
            border-color: var(--primary) !important;
            background-color: rgba(0, 255, 204, 0.1);
            position: relative;
            overflow: hidden !important; /* Keep simmer inside */
        }
        .day-active::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-20deg) translateX(-150%);
            animation: shimmer 3s infinite; /* 3s cycle */
            pointer-events: none;
        }

        /* Responsive Rig Image */
        .rig-image {
            position: absolute; 
            right: 130px; 
            bottom: 8px; 
            height: 110px; 
            width: auto; 
            object-fit: contain;
            transition: opacity 0.35s;
            opacity: 1;
        }
        
        @media (max-width: 600px) {
            .rig-image {
                right: 20px; /* Closer to edge on mobile */
            }
        }

        /* Ambient Background Glow 1: Von oben mittig auslaufend */
        body {
            background: var(--bg-body) radial-gradient(circle at 50% -10%, rgba(0, 128, 128, 0.4) 0%, rgba(8, 9, 12, 0) 60%) no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        
        <!-- DASHBOARD HOME -->
        <div id="screen-home" class="screen active" style="display:block !important; opacity:1; height: auto !important; min-height: 100%; padding-bottom: 150px;">
            <div class="header-row" style="position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; margin-top: 10px;">
                <!-- KELLERGYM Title (Centered) -->
                <h1 style="font-size: 32px; margin: 0; line-height: 1; font-weight: 400; font-family: 'Black Ops One', cursive;">Keller<span style="color: var(--primary);">Gym</span></h1>
                
                <!-- Icons (Absolute Right) -->
                <div style="position: absolute; right: 0; top: 50%; transform: translateY(-50%); display:flex; gap:15px; align-items:center;">
                   <a href="profile.html" style="width:40px; height:40px; border-radius:50%; overflow: hidden; border: 1px solid #333; position: relative; display: block;">
                        <!-- Spinner Background -->
                        <i id="header-profile-spinner" class="fa-solid fa-circle-notch fa-spin" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--primary); font-size: 16px;"></i>
                        <img id="header-profile-img" src="img/icon.png" alt="Profile" style="width: 100%; height: 100%; object-fit: cover; display: block; position: relative; z-index: 2; opacity: 0; transition: opacity 0.3s ease;">
                   </a>

            </div>

            <!-- Training Card (Toggle Today/Tomorrow) -->

                    <span style="color:var(--primary)">Heutiges Training</span>

                <!-- Link Arrow -->

                    <i class="fa-solid fa-chevron-right"></i>

                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div id="daily-train-title" style="font-size: 22px; font-weight: 800; margin-bottom: 5px;"> </div>

            </div>

            <!-- Training Week Section -->
            <div style="margin-bottom: 25px;">
                <div class="simple-card" onclick="window.location.href='workouts.html'" style="cursor: pointer; padding: 15px; display: flex; flex-direction: column; gap: 10px; position:relative;">
                    <div style="font-size:18px; font-weight:700; margin-bottom:5px;">Deine Trainingswoche</div>
                    
                    <!-- Link Arrow -->
                    <a href="workouts.html" onclick="event.stopPropagation();" style="position: absolute; top: 15px; right: 15px; color: var(--text-mute); font-size: 14px; text-decoration: none;">
                        <i class="fa-solid fa-chevron-right"></i>

            <!-- Quote & Nutrition Grid -->

                <!-- Quote (Tagesspruch) -->

                    </div>

                <!-- Nutrition (Ernährung) -->
                <div class="simple-card" id="nutri-card" onclick="toggleNutritionView()" style="padding: 15px; height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; cursor: pointer;">
                    <div style="width: 100%; text-align: left; font-size:17px; font-weight:700;">Ernährung</div>
                    
                    <!-- Link Arrow -->
                    <a href="nutrition.html" onclick="event.stopPropagation();" style="position: absolute; top: 15px; right: 15px; color: var(--text-mute); font-size: 14px; text-decoration: none;">

                    <!-- Gauge Area -->
                    <div style="position: relative; width: 100px; height: 60px; margin-top: 5px;">
                         <!-- SVG Gauge -->
                         <svg viewBox="0 0 100 60" style="width: 100px; height: 60px; overflow: visible;">
                            <!-- Gradient Def -->
                            <defs>
                                <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
                                    <stop offset="50%" style="stop-color:#ffcc00;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#66ff66;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <!-- Background Track - Thicker (12) -->
                            <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#333" stroke-width="12" stroke-linecap="round" />
                            <!-- Colored Value Track (gradient) - Thicker (12) -->
                              <path id="gauge-path" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="url(#gaugeGrad)" stroke-width="12" stroke-linecap="round" stroke-dasharray="130" stroke-dashoffset="130" style="transition: stroke-dashoffset 0.8s ease-out;" />
                                <g id="gauge-knob-group">
                                    <circle cx="50" cy="10" r="8" fill="#1c1e24" stroke="var(--primary)" stroke-width="3" /> 
                                </g>

                        <div class="n-dot" id="nd-3"></div>

            </div>

             <!-- NEW SECTION: Gewicht / Training History & Wasser -->
             <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
                
                <!-- Wasser -->
                <div id="section-water" class="simple-card" style="padding: 10px; display: flex; flex-direction: column; justify-content: space-between; min-height: 120px; background: #15161A;">

                    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; position:relative;">
                        <div style="font-size:14px; font-weight:800; color:#fff;" id="water-total">0.0 L</div>
                        
                        <!-- Example Glass -->
                        <div style="width:30px; height:45px; border:2px solid rgba(255,255,255,0.3); border-top:none; border-radius:0 0 8px 8px; position:relative; overflow:hidden; background:rgba(255,255,255,0.05);">
                            <div id="water-fill" style="position:absolute; bottom:0; left:0; right:0; height:0%; background:rgb(69, 163, 226); transition: height 0.3s ease;"></div>
                        </div>
                    </div>

                    <!-- Controls -->
                    <div style="position: relative; display:flex; align-items:center; justify-content:center; gap:4px; margin-top:4px; background:#222; border-radius:12px; padding:2px; align-self: center; width: 100%; box-sizing: border-box;">

            <!-- Sleep Section -->

                <!-- Link Arrow -->

                    <i class="fa-solid fa-chevron-right"></i>
                </a>

                <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                    <div style="font-size:28px; font-weight: 800; color: #fff;">

                        20<span style="font-size:16px; color:var(--text-mute);">min</span>
                    </div>
                    <div style="font-size:12px; font-weight:600; color: #666; background:#222; padding:4px 8px; border-radius:6px;">
                        Heutiger Schlaf
                    </div>
                </div>
                
                <div style="font-size:12px; color: var(--text-mute); margin-bottom: 5px;">Letzte 7 Tage</div>

                <div id="sleep-chart" style="display: flex; justify-content: space-between; align-items: flex-end; height: 50px; gap: 4px;">
                    <!-- JS generated -->

            </div>

        </div> <!-- End Screen Home -->
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-icon active"><i class="fa-solid fa-house"></i></a>
        <a href="workouts.html" class="nav-icon"><i class="fa-solid fa-dumbbell"></i></a>
        <a href="nutrition.html" class="nav-icon"><i class="fa-solid fa-utensils"></i></a>
        <a href="profile.html" class="nav-icon" id="nav-profile-icon"><i class="fa-regular fa-user"></i></a>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check for test mode flag and color the profile icon
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('devmode') === 'true') {
                const profileIcon = document.getElementById('nav-profile-icon');
                if (profileIcon) {
                    profileIcon.style.color = 'var(--primary)';
                }
            }
        });
        const DAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
        
        // Nutrition Logic
        let currentNutriMode = 0; // 0=Cal, 1=Prot, 2=Carb
        
        const NUTRI_DEFAULTS = [
            { label: 'Kalorien', max: 3500, current: 800, colorStart: '#ff4444', colorEnd: '#66ff66' },
            { label: 'Eiweiß', max: 160, current: 140, colorStart: '#4444ff', colorEnd: '#88ccff' },
            { label: 'Kohlenhydrate', max: 400, current: 170, colorStart: '#ffaa00', colorEnd: '#ffff44' }
        ];

        let nutriData = [...NUTRI_DEFAULTS];
        let lastGaugePercentage = 0;
        let gaugeAnimationId = null;

        function toggleNutritionView() {
            currentNutriMode = (currentNutriMode + 1) % 3;
            renderNutrition();
        }

        function renderNutrition() {
            const mode = nutriData[currentNutriMode];
            
            // Text Updates
            document.getElementById('nutri-label').innerText = mode.label;
            let unit = '';
            if (currentNutriMode === 0) unit = ' kcal';
            if (currentNutriMode === 1 || currentNutriMode === 2) unit = 'g';
            
            document.getElementById('nutri-val').innerText = mode.current;
            document.getElementById('nutri-max').innerText = '/ ' + mode.max + unit;
            
            // Active Dot
            document.getElementById('nd-1').classList.toggle('active', currentNutriMode === 0);
            document.getElementById('nd-2').classList.toggle('active', currentNutriMode === 1);
            document.getElementById('nd-3').classList.toggle('active', currentNutriMode === 2);

            // Target Percentage
            // Target Percentage
            const percentage = Math.min(Math.max(mode.current / mode.max, 0), 1); // Clamp 0-1
            
            // Stop logic: If we are already animating, cancel it
            if(gaugeAnimationId) cancelAnimationFrame(gaugeAnimationId);
            
            // Start Animation from last known pos to new target
            animateGauge(lastGaugePercentage, percentage, 800);
            
            // Update last pos
            lastGaugePercentage = percentage;
        }

        function animateGauge(start, end, duration) {
            const startTime = performance.now();
            const range = end - start;
            
            // Ensure elements exist
            const pathEl = document.getElementById('gauge-path');
            const knobGroup = document.getElementById('gauge-knob-group');
            const knobCircle = document.querySelector('#gauge-knob-group circle');
            
            if(!pathEl || !knobGroup) return;

            // Important: Disable transition during animation to prevent conflict
            pathEl.style.transition = 'none';
            knobGroup.style.transition = 'none';

            function step(currentTime) {
                const elapsed = currentTime - startTime;
                let progress = Math.min(elapsed / duration, 1);
                if (duration === 0) progress = 1;
                
                // Ease Out Cubic
                const ease = 1 - Math.pow(1 - progress, 3); 
                
                const currentPct = start + (range * ease);
                
                // Update DOM
                  const maxDash = 130;
                  const offset = maxDash - (maxDash * currentPct);
                  pathEl.style.strokeDashoffset = offset;

                  // Rotate knob
                  const angle = -90 + (180 * currentPct);
                  knobGroup.style.transformOrigin = '50px 50px';
                  knobGroup.style.transform = `rotate(${angle}deg)`;

                // Color Interpolation based on currentPct (Position on Bar)
                const c1 = "#ff4444";
                const c2 = "#ffcc00";
                const c3 = "#66ff66";
                let currentColor;
                
                let cp = Math.min(Math.max(currentPct, 0), 1);
                
                if(cp < 0.5) {
                    currentColor = interpolateColor(c1, c2, cp * 2);
                } else {
                    currentColor = interpolateColor(c2, c3, (cp - 0.5) * 2);
                }
                
                if(knobCircle) {
                    knobCircle.setAttribute('fill', currentColor);
                    knobCircle.setAttribute('stroke', '#333'); 
                    knobCircle.setAttribute('stroke-width', '3'); 
                }

                if(progress < 1) {
                    gaugeAnimationId = requestAnimationFrame(step);
                } else {
                    gaugeAnimationId = null;
                }
            }
            
            gaugeAnimationId = requestAnimationFrame(step);
        }
        
        // Helper for colors
        function interpolateColor(color1, color2, factor) {
             function hexToRgb(hex) {
                var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : {r:0, g:0, b:0};
            }
             
             if (factor > 1) factor = 1;
             if (factor < 0) factor = 0;
            
             const c1 = hexToRgb(color1);
             const c2 = hexToRgb(color2);

             const r = Math.round(c1.r + factor * (c2.r - c1.r));
             const g = Math.round(c1.g + factor * (c2.g - c1.g));
             const b = Math.round(c1.b + factor * (c2.b - c1.b));
             
             return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function renderWeek() {
            const container = document.getElementById('week-overview');
            if(!container) return;
            container.innerHTML = '';

            // Get today's index (0=Sun, 1=Mon in JS, but we want 0=Mon)
            let todayObj = new Date();
            let todayDate = todayObj.getDay(); 
            let todayIndex = (todayDate === 0) ? 6 : todayDate - 1; // Normalize: Mon=0 ... Sun=6

            // Sofort: alle Tage als Restday anzeigen
            DAYS.forEach((day, index) => {
                const isToday = (index === todayIndex);
                // Outer column
                const col = document.createElement('div');
                col.className = 'week-day-col';
                col.style.display = 'flex';
                col.style.flexDirection = 'column';
                col.style.alignItems = 'center';
                col.style.gap = '5px';

                col.style.border = '2px solid transparent'; // base border
                col.style.borderRadius = '16px';
                col.style.padding = '4px'; 
                col.style.transition = '0.3s';
                col.style.minWidth = '40px'; 

                if(isToday) {
                    col.classList.add('day-active'); // Use class for shimmer
                }

                // Circle (30x30)
                const circle = document.createElement('div');
                circle.style.width = '30px';
                circle.style.height = '30px';
                circle.style.borderRadius = '50%';
                circle.style.display = 'flex';
                circle.style.alignItems = 'center';
                circle.style.justifyContent = 'center';

                circle.style.border = '1px solid transparent';
                circle.style.background = '#2a2d35';
                // Couch-Icon (FontAwesome)

        // Setzt das Training-UI (wird auch initial aufgerufen)
        async function setTrainingCard() {
                // Tag bestimmen
                let d = new Date();
                let idx = d.getDay(); // 0=So, 1=Mo
                let weekIdx = (idx === 0) ? 6 : idx - 1; // 0=Mo, 6=So
                if(trainingState === 1) {
                    weekIdx = (weekIdx + 1) % 7;
                }
                const weekDays = ['Mo','Di','Mi','Do','Fr','Sa','So'];
                const todayLabel = weekDays[weekIdx];
                // DEBUG: Tag und Daten anzeigen

                console.log('Heute (todayLabel):', todayLabel);
            const header = document.getElementById('training-header');
            const title = document.getElementById('daily-train-title');
            const desc = document.getElementById('daily-train-desc');

            if(dot1) dot1.classList.remove('active');
            if(dot2) dot2.classList.remove('active');

            // Platzhalter: Während des Ladens
            let tTitle = ' ';
            let tDesc = ' ';
            let tImg = 'img/loading.png';
            let tTime = '';
            let tCount = 0;

            // Header setzen
            if(header) header.innerHTML = `<span style="color:var(--primary)">${trainingState === 0 ? 'Heutiges Training' : 'Morgiges Training'}</span>`;
            if(dot1 && trainingState === 0) dot1.classList.add('active');
            if(dot2 && trainingState === 1) dot2.classList.add('active');

            // Sofort: Platzhalter anzeigen mit Fade-Out
            if(title) {

                title.style.pointerEvents = 'none';
            }
            if(desc) {
                desc.style.opacity = 0;
                desc.style.pointerEvents = 'none';
            }
            if(img) img.style.opacity = 0;

            // Nachladen aus DB
            try {
                const supabase = (await import('./supabase-config.js')).supabase;
                let userId = null;
                if(window.obData && window.obData.user_id) {
                    userId = window.obData.user_id;
                } else if(window.obData && window.obData.id) {
                    userId = window.obData.id;
                } else if(localStorage.getItem('kellerGymData')) {
                    const d = JSON.parse(localStorage.getItem('kellerGymData'));
                    userId = d.user_id || d.id;
                }
                if(userId) {
                    // Aktiven Plan holen (inkl. workout_days)
                    const { data: plan, error: planErr } = await supabase
                        .from('workout_plans')
                        .select('id, workout_days')
                        .eq('user_id', userId)
                        .eq('is_active', true)
                        .maybeSingle();
                    if(plan && plan.id) {
                        let workoutDays = [];
                        if(plan.workout_days) {
                            workoutDays = plan.workout_days.split(',').map(d => d.trim());
                        }
                        // Ist heute/morgen ein Trainingstag?
                        console.log('Aktiver Plan workout_days:', workoutDays);
                        if(workoutDays.includes(todayLabel)) {
                            // Exercises für diesen Plan und Tag holen
                            const { data: exRows, error: exErr } = await supabase
                                .from('plan_exercises')
                                .select('split_day, day, sets_soll')
                                .eq('plan_id', plan.id);
                            console.log('Alle geladenen plan_exercises:', exRows, 'Fehler:', exErr);
                            if(exErr) {
                                console.error('Fehler beim Laden der plan_exercises:', exErr);
                            }
                            if(exRows && exRows.length > 0) {
                                const norm = s => (s || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                                const todayRows = exRows.filter(r => {
                                    const rDay = norm(r.day);
                                    const tLabel = norm(todayLabel);
                                    if (rDay === tLabel) {
                                        return true;
                                    } else {
                                        // Debug: zeige alle Vergleiche
                                        console.log('Vergleich plan_exercises:', {rDay, tLabel, origDay: r.day, todayLabel});
                                        return false;
                                    }
                                });
                                console.log('Alle plan_exercises für heute:', todayRows);
                                if(todayRows.length > 0) {
                                    tTitle = todayRows[0].split_day || 'Training';
                                    tCount = todayRows.length;

                                    let totalSets = todayRows.reduce((sum, ex) => sum + (parseInt(ex.sets_soll) || 0), 0);
                                    tTime = formatTime(totalSets * 3);
                                    tDesc = `${tTime}, ${tCount} Übungen`;
                                    // Bildlogik
                                    if(/upper/i.test(tTitle)) tImg = 'img/upper_body.png';
                                    else if(/lower/i.test(tTitle)) tImg = 'img/lower_body.png';
                                    else if(/brust/i.test(tTitle)) tImg = 'img/chest.png';
                                    else if(/rück|rueck|back/i.test(tTitle)) tImg = 'img/back.png';
                                    else if(/bein|legs/i.test(tTitle)) tImg = 'img/legs.png';
                                    else if(/schulter.*arm|shoulds.*arms/i.test(tTitle)) tImg = 'img/shoulds_arms.png';
                                    else if(/schulter|shoulder/i.test(tTitle)) tImg = 'img/shoulders.png';
                                    else if(/arm|arms/i.test(tTitle)) tImg = 'img/arms.png';
                                    else if(/bizeps|biceps/i.test(tTitle)) tImg = 'img/biceps_.png';
                                    else if(/trizeps|triceps/i.test(tTitle)) tImg = 'img/triceps.png';
                                    else if(/ganzk|full/i.test(tTitle)) tImg = 'img/full_body.png';
                                    else if(/push/i.test(tTitle)) tImg = 'img/push.png';
                                    else if(/pull/i.test(tTitle)) tImg = 'img/pull.png';
                                    else tImg = 'img/full_body.png';
                                }
                            }
                        } else {
                            // Kein Training heute: Rest Day
                            tTitle = 'Rest Day';
                            tDesc = 'Regeneriere dich';
                            tImg = 'img/rest.png';
                        }
                        // Update UI
                        // Nach kurzem Timeout Werte setzen und Fade-In
                        setTimeout(() => {
                            if(title) {
                                title.innerText = tTitle;
                                title.style.opacity = 1;
                                setTimeout(() => { title.style.pointerEvents = 'auto'; }, 500);
                            }
                            if(desc) {
                                desc.innerText = tDesc;
                                desc.style.opacity = 1;
                                setTimeout(() => { desc.style.pointerEvents = 'auto'; }, 500);
                            }
                            if(img) {
                                img.src = tImg;
                                img.style.opacity = 1;
                            }
                        }, 200);
                    }
                }
            } catch(e) { /* Fehler ignorieren, bleibt bei Rest Day */ }
        }

        // Inline script to init dashboard specific logic
        document.addEventListener('DOMContentLoaded', () => {

    <script type="module">
        import { supabase } from './supabase-config.js';

        // --- Supabase Water Sync Logic ---
        function getLocalTodayStr() {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // Use local timezone date instead of UTC
        let todayStr = getLocalTodayStr();
        let userId = null;

        // Debounce timer for updates
        let syncTimeout = null;

        function calculateDetailedTargets(profile) {
            const gender = profile.gender || 'male';
            const weight = parseFloat(profile.weight_kg) || 75;
            const age = parseInt(profile.age) || 25;
            const height = parseFloat(profile.height_cm) || 175;
            const bodyfatPercent = parseFloat(profile.bodyfat_percent) || 15;
            const activityKey = profile.activity_level || 'low';
            const goalKey = profile.goal || 'maintain_build';

            const bodyfat = bodyfatPercent / 100;
            const LBM = weight * (1 - bodyfat);
            let BMR_raw = 370 + (21.6 * LBM);
            if (gender === 'female') BMR_raw = BMR_raw * 0.97;
            
            let ageFactor = 1;
            if (age > 20) ageFactor = 1 - (0.012 * ((age - 20) / 10));
            const BMR = BMR_raw * ageFactor;

            let activityFactor = 1.2;
            if (activityKey === 'low') activityFactor = 1.4;
            if (activityKey === 'somewhat') activityFactor = 1.55;
            if (activityKey === 'med') activityFactor = 1.7;
            if (activityKey === 'high') activityFactor = 1.85;

            const TDEE = BMR * activityFactor;
            const heightMeters = height / 100;
            const BMI = weight / (heightMeters * heightMeters);

            let goalFactor = 1.0;
            if (goalKey === 'lose_build') goalFactor = 0.85;
            if (goalKey === 'gain_build') {
                if (BMI < 18.5) goalFactor = 1.25;
                else if (BMI < 21) goalFactor = 1.18;
                else goalFactor = 1.12;
            }

            let trainingBonus = 1.0;
            if (goalKey === 'gain_build') trainingBonus = 1.08;

            let calories = TDEE * goalFactor * trainingBonus;
            let minCal = (gender === 'female') ? 1300 : 1600;
            if (calories < minCal) calories = minCal;
            
            calories = Math.round(calories);
            const protein = Math.round(weight * 2.0);
            
            // Fett: 25% der täglichen Kalorien (1g Fett = 9 kcal)
            const fat = Math.round((calories * 0.25) / 9); 
            
            const leftoverKcal = calories - (protein * 4) - (fat * 9);
            const carbs = Math.max(0, Math.round(leftoverKcal / 4));

            return { calories, protein, carbs, fat };
        }

        async function initWaterBase() {
            const { data: { user } } = await supabase.auth.getUser();
            if(!user) return;
            userId = user.id;

            // 1. Profil-Infos (Wasser-Ziel & Profilbild) holen
            const { data: profile, error: profileErr } = await supabase
                .from('user_profiles')
                .select('*')
                .eq('user_id', userId)
                .maybeSingle();

            if (profileErr) {
                console.error("Fehler beim Laden des Profils (Dashboard):", profileErr);
            }

            if (profile) {
                // Profildaten global und lokal speichern
                window.obData = {
                    ...profile,
                    // Kompatibilität zu älteren Feldern
                    age: profile.age,
                    gender: profile.gender,
                    weight: profile.weight_kg,
                    height: profile.height_cm,
                    bodyfat: profile.bodyfat_percent,
                    activity: profile.activity_level,
                    exp: profile.experience_level,
                    goal: profile.goal,
                    location: profile.training_location,
                    equipment: profile.equipment ? profile.equipment.split(',').map(e => e.trim()) : [],
                    freq: profile.workouts_per_week,
                    split: profile.training_split,
                    days: profile.workout_days ? profile.workout_days.split(',').map(d => d.trim()) : [],
                    plan_name: profile.plan_name || '',
                    profileImage: profile.profile_image || ''
                };
                localStorage.setItem('kellerGymData', JSON.stringify(window.obData));

                // Makros & Kalorien berechnen
                const targets = calculateDetailedTargets(profile);
                nutriData[0].max = targets.calories;
                nutriData[1].max = targets.protein;
                nutriData[2].max = targets.carbs;

                // Aktuelle Ernährungsdaten (Food Logs) holen
                const { data: foodLogs } = await supabase
                    .from('food_logs')
                    .select('calories, protein, carbs')
                    .eq('user_id', userId)
                    .eq('date', todayStr);

                let totalKcal = 0;
                let totalProtein = 0;
                let totalCarbs = 0;

                if (foodLogs && foodLogs.length > 0) {
                    foodLogs.forEach(log => {
                        totalKcal += log.calories || 0;
                        totalProtein += log.protein || 0;
                        totalCarbs += log.carbs || 0;
                    });
                }

                nutriData[0].current = Math.round(totalKcal);
                nutriData[1].current = Math.round(totalProtein);
                nutriData[2].current = Math.round(totalCarbs);

                // --- UI nach Supabase-Load aktualisieren ---
                renderNutrition();
                renderWater();
                if (typeof renderWeek === 'function') renderWeek();
                if (typeof renderHistory === 'function') renderHistory();
                if (typeof renderSleep === 'function') renderSleep();
                // Profilbild im Header setzen
                const headerImg = document.getElementById('header-profile-img');
                if (headerImg) {
                    if (profile.profile_image) {
                        headerImg.src = profile.profile_image;
                    }
                    headerImg.style.opacity = '1';
                }
                // Wasser Ziel setzen
                if (profile.water_goal_ml) {
                    if(window.setWaterGoal) window.setWaterGoal(profile.water_goal_ml);
                }
            }

            // 2. Heutigen Wasser-Log holen oder erstellen
            const { data: waterLog, error } = await supabase
                .from('water_logs')
                .select('*')
                .eq('user_id', userId)
                .eq('date', todayStr)
                .maybeSingle();

            if (waterLog) {
                // Es gibt schon einen, lade den Wert ins UI
                if(window.setWaterAmount) window.setWaterAmount(waterLog.amount_ml);
            } else {
                // Es gibt keinen, lege einen neuen mit 0ml in der DB an
                const { error: insertError } = await supabase.from('water_logs').insert([{
                    user_id: userId,
                    date: todayStr,
                    amount_ml: 0
                }]);
                
                if(insertError) {
                    console.error("Water Insert Error:", insertError);
                    alert("Wasser konnte nicht initialisiert werden: " + insertError.message);
                } else {
                    console.log("Neuer Wasser-Log für heute erstellt!");
                }
                
                if(window.setWaterAmount) window.setWaterAmount(0);
            }
        }

        document.addEventListener('waterUpdated', (e) => {
            if (!userId) return;
            const newAmount = e.detail;
            
            // Debouncing: 600ms warten, bevor wir es in die Cloud jagen,
            // damit schnelles Klick-Spamming nicht 10 DB-Requests auslöst
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                const { error } = await supabase
                    .from('water_logs')
                    .update({ amount_ml: newAmount })
                    .eq('user_id', userId)
                    .eq('date', todayStr);
                
                if(error) {
                    console.error("Water Sync Error:", error);
                    alert("Wasser konnte nicht geupdatet werden: " + error.message);
                } else {
                    console.log("Wasser in Cloud gespeichert:", newAmount, "ml");
                }
            }, 600);
        });

        // Initialize when script loads
        initWaterBase();
    </script>
