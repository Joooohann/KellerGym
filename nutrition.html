<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KellerGym - Ernährung</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">

    <style>
        .simple-card {
            background-color: #15161A;
            border-radius: 24px;
        }

        .week-day-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 4px;
            transition: 0.3s;
            min-width: 40px;
            cursor: pointer;
        }
        
        .week-day-col:hover {
            background-color: rgba(255,255,255,0.05);
        }

        .week-day-col.selected {
             background-color: #2a2d35;
             border-color: #444;
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-20deg); }
            100% { transform: translateX(200%) skewX(-20deg); }
        }
        
        .day-active {
            border-color: var(--primary) !important;
            background-color: rgba(0, 255, 204, 0.1);
            position: relative;
            overflow: hidden !important;
        }
        
        .day-active::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-20deg) translateX(-150%);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }

        .macro-bar-bg {
            background-color: #2a2d35;
            height: 6px;
            border-radius: 3px;
            width: 100%;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .macro-bar-fill {
            height: 100%;
            border-radius: 3px;
        }
        
        .macro-carbs { background-color: var(--accent-blue); }
        .macro-protein { background-color: var(--primary); }
        .macro-fat { background-color: #e67e22; }

        .meal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .meal-row:last-child {
            border-bottom: none;
        }
        
        .add-meal-btn {
            background: #2a2d35;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-mute);
            cursor: pointer;
        }
        
        .copy-meal-btn {
            color: var(--text-mute);
            font-size: 16px;
            cursor: pointer;
            padding: 5px;
        }

        /* Circular Progress approximation styling */
        .circle-wrap {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* The SVG handles the border now, so we remove the background/border from circle-wrap */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(135deg);
            transform-origin: 50% 50%;
            stroke-linecap: round;
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        <!-- Header -->
        <div class="header-row" style="justify-content:center; margin-top:10px; margin-bottom: 25px;">
            <h1 style="font-family: 'Black Ops One', cursive; color: var(--primary); font-size: 32px; margin:0; font-weight: 400;">Ernährung</h1>
        </div>

        <!-- Week Grid -->
        <div class="simple-card" style="padding: 15px; margin-bottom: 25px;">
            <div id="week-grid" style="display: flex; justify-content: space-between; gap: 5px;">
                <!-- JS Generated -->
            </div>
        </div>
        
        <!-- Main Content Area -->
        <div id="nutrition-content">
            
            <!-- Daily Plan Overview -->
            <div class="carbon-card" style="padding: 20px; text-align: center; margin-bottom: 25px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <i class="fa-solid fa-chevron-left" style="color: var(--text-mute);"></i>
                    <div style="font-size: 18px; font-weight: 700;">Ernährungsplan heute</div>
                    <i class="fa-solid fa-chevron-right" style="color: var(--text-mute);"></i>
                </div>
                
                <div style="display: flex; justify-content: space-evenly; align-items: center; margin-bottom: 10px;">
                    <!-- Konsumiert -->
                    <div>
                        <div style="font-size: 20px; font-weight: 700;">0</div>
                        <div style="font-size: 12px; color: var(--text-mute);">konsumiert</div>
                    </div>
                    
                    <!-- Circle Offen -->
                    <div class="circle-wrap">
                        <svg class="progress-ring" width="120" height="120" style="position: absolute; top: 0; left: 0;">
                            <!-- background arc -->
                            <circle class="progress-ring__circle" stroke="#2a2d35" stroke-width="8" fill="transparent" r="52" cx="60" cy="60" stroke-dasharray="326.72" stroke-dashoffset="81.68"/>
                            <!-- foreground arc (the progress) -->
                            <circle class="progress-ring__circle" stroke="var(--primary)" stroke-width="8" fill="transparent" r="52" cx="60" cy="60" stroke-dasharray="326.72" stroke-dashoffset="150" />
                        </svg>
                        <div style="z-index: 10;">
                            <div style="font-size: 24px; font-weight: 800; color: var(--primary);">3000</div>
                            <div style="font-size: 14px; font-weight: 600;">kcal offen</div>
                        </div>
                    </div>
                    
                    <!-- Geplant -->
                    <div>
                        <div style="font-size: 20px; font-weight: 700;">3000</div>
                        <div style="font-size: 12px; color: var(--text-mute);">geplant</div>
                    </div>
                </div>
                
                <!-- Macros Row -->
                <div style="display: flex; justify-content: space-between; gap: 15px; text-align: center;">
                    <div style="flex: 1;">
                        <div style="font-size: 14px; font-weight: 700; margin-bottom: 5px;">Kohlenhydrate</div>
                        <div class="macro-bar-bg"><div class="macro-bar-fill macro-carbs" style="width: 0%;"></div></div>
                        <div style="font-size: 12px; color: var(--text-mute); margin-top: 5px;">0 / 405g</div>
                    </div>
                    <div style="flex: 1;">
                        <div style="font-size: 14px; font-weight: 700; margin-bottom: 5px;">Eiweiß</div>
                        <div class="macro-bar-bg"><div class="macro-bar-fill macro-protein" style="width: 0%;"></div></div>
                        <div style="font-size: 12px; color: var(--text-mute); margin-top: 5px;">0 / 180g</div>
                    </div>
                    <div style="flex: 1;">
                        <div style="font-size: 14px; font-weight: 700; margin-bottom: 5px;">Fett</div>
                        <div class="macro-bar-bg"><div class="macro-bar-fill macro-fat" style="width: 0%;"></div></div>
                        <div style="font-size: 12px; color: var(--text-mute); margin-top: 5px;">0 / 60g</div>
                    </div>
                </div>
            </div>

            <!-- Meals Section -->
            <div class="simple-card" style="padding: 15px; margin-bottom: 25px;">
                <div class="meal-row">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <i class="fa-solid fa-mug-saucer" style="color: #f1c40f; font-size: 18px; width: 20px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 700;">Frühstück</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <i class="fa-regular fa-copy copy-meal-btn"></i>
                        <div class="add-meal-btn"><i class="fa-solid fa-plus"></i></div>
                    </div>
                </div>
                
                <div class="meal-row">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <i class="fa-solid fa-burger" style="color: #d79154; font-size: 18px; width: 20px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 700;">Mittag</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <i class="fa-regular fa-copy copy-meal-btn"></i>
                        <div class="add-meal-btn"><i class="fa-solid fa-plus"></i></div>
                    </div>
                </div>

                <div class="meal-row">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <i class="fa-solid fa-pizza-slice" style="color: #c4712d; font-size: 18px; width: 20px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 700;">Abend</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <i class="fa-regular fa-copy copy-meal-btn"></i>
                        <div class="add-meal-btn"><i class="fa-solid fa-plus"></i></div>
                    </div>
                </div>

                <div class="meal-row">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <i class="fa-solid fa-apple-whole" style="color: #e74c3c; font-size: 18px; width: 20px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 700;">Snack</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <i class="fa-regular fa-copy copy-meal-btn"></i>
                        <div class="add-meal-btn"><i class="fa-solid fa-plus"></i></div>
                    </div>
                </div>
            </div>

            <!-- Water Tracking -->
            <div class="simple-card" style="padding: 15px; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: rgba(0, 210, 255, 0.1); border: 2px solid var(--accent-blue); display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-droplet" style="color: var(--accent-blue);"></i>
                    </div>
                    <span style="font-size: 18px; font-weight: 800;">0,0L</span>
                </div>
                
                <div style="display: flex; align-items: center; background: #2a2d35; border-radius: 20px; padding: 5px;">
                    <div style="width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-mute);"><i class="fa-solid fa-minus"></i></div>
                    <div style="padding: 0 10px; font-size: 14px; font-weight: 700;">100 ml</div>
                    <div style="width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-main); background: rgba(255,255,255,0.1);"><i class="fa-solid fa-plus"></i></div>
                </div>
            </div>

            <!-- Foods Button -->
            <button id="btn-show-foods" style="width: 100%; border: none; background: #2a2d35; color: white; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 25px; transition: 0.3s;">
                <i class="fa-solid fa-list" style="margin-right: 8px; color: var(--primary);"></i> Alle Nahrungsmittel anzeigen
            </button>

        </div>

    </div>

    <!-- Foods List Modal -->
    <div id="food-list-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #15161A; z-index: 1000; overflow-y: auto; padding-bottom: 90px; flex-direction: column;">
        <div style="padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; background: #15161A; z-index: 10;">
            <i class="fa-solid fa-arrow-left" id="btn-close-foods" style="font-size: 20px; cursor: pointer; padding-right: 15px;"></i>
            <div style="font-size: 20px; font-weight: 700;">Alle Nahrungsmittel</div>
        </div>

        <!-- Sorting & Search Controls -->
        <div style="padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; background: #1a1c20; border-bottom: 1px solid #333;">
            <div style="display: flex; align-items: center; background: #2a2d35; border: 1px solid #444; border-radius: 8px; padding: 0 10px;">
                <i class="fa-solid fa-magnifying-glass" style="color: var(--text-mute); font-size: 14px;"></i>
                <input type="text" id="foods-search-input" placeholder="Nach Name oder Marke suchen..." style="flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 14px; outline: none;">
                <i class="fa-solid fa-xmark" id="foods-search-clear" style="color: var(--text-mute); font-size: 14px; cursor: pointer; display: none; padding: 5px;"></i>
            </div>
            <div style="font-size: 13px; color: var(--text-mute);">Sortieren nach:</div>
            <div style="display: flex; justify-content: space-between; gap: 10px;">
                <select id="foods-sort-field" style="flex: 1; background: #2a2d35; color: white; border: 1px solid #444; padding: 6px 10px; border-radius: 8px; font-size: 14px; outline: none;">
                    <option value="standard">Standard</option>
                    <option value="name">Name</option>
                    <option value="kcal">Kalorien</option>
                    <option value="base">Gramm</option>
                    <option value="protein">Eiweiß</option>
                </select>
                <select id="foods-sort-dir" style="flex: 1; background: #2a2d35; color: white; border: 1px solid #444; padding: 6px 10px; border-radius: 8px; font-size: 14px; outline: none;">
                    <option value="asc">Aufsteigend</option>
                    <option value="desc">Absteigend</option>
                </select>
            </div>
        </div>
        
        <div id="foods-container" style="padding: 15px; display: flex; flex-direction: column; gap: 10px;">
            <!-- Loading Spinner -->
            <div style="text-align: center; padding: 20px;" id="foods-loading">
                 <i class="fa-solid fa-spinner fa-spin" style="font-size: 24px; color: var(--primary);"></i>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
        <a href="workouts.html" class="nav-icon"><i class="fa-solid fa-dumbbell"></i></a>
        <a href="nutrition.html" class="nav-icon active"><i class="fa-solid fa-utensils"></i></a>
        <a href="profile.html" class="nav-icon"><i class="fa-regular fa-user"></i></a>
    </div>

    <script>
        const DAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
        let todayIndex = 0;
        let selectedDayIndex = 0;

        document.addEventListener('DOMContentLoaded', () => {
            initWeek();
        });

        function initWeek() {
            const d = new Date();
            let day = d.getDay(); // 0=Sun, 1=Mon
            todayIndex = (day === 0) ? 6 : day - 1;
            
            selectedDayIndex = todayIndex;
            renderWeek();
        }

        function renderWeek() {
            const container = document.getElementById('week-grid');
            if(!container) return;
            container.innerHTML = '';
            
            DAYS.forEach((label, idx) => {
                const isToday = (idx === todayIndex);
                const isSelected = (idx === selectedDayIndex);

                const col = document.createElement('div');
                col.className = 'week-day-col';
                
                // Add active/selected classes visually from style.css likely applies to week-day-col
                if (isToday) col.classList.add('day-active');
                if (isSelected) col.classList.add('selected');

                col.onclick = () => {
                    selectedDayIndex = idx;
                    renderWeek();
                };
                
                // Circle Icon
                const circle = document.createElement('div');
                circle.style.width = '30px';
                circle.style.height = '30px';
                circle.style.borderRadius = '50%';
                circle.style.display = 'flex';
                circle.style.alignItems = 'center';
                circle.style.justifyContent = 'center';
                
                // From workouts.html week style logic matching the screenshot
                let isWorkout = true; // Placeholder, assuming mostly workouts
                try {
                    const stored = localStorage.getItem('kellerGymPlan');
                    if(stored) {
                        const plan = JSON.parse(stored);
                        isWorkout = plan[idx] !== 'off';
                    } else {
                        const DEFAULT_PLAN = ['lower', 'upper', 'off', 'lower', 'full', 'off', 'off'];
                        isWorkout = DEFAULT_PLAN[idx] !== 'off';
                    }
                } catch(e) {}
                
                if(isWorkout) {
                    circle.style.border = '2px solid var(--primary)';
                    circle.style.background = 'rgba(0, 255, 204, 0.1)';
                    // Biceps Image
                    circle.innerHTML = `<img src="img/biceps_2.png" style="width: 18px; height: 18px; object-fit: contain;">`;
                } else {
                    circle.style.border = '1px solid transparent';
                    circle.style.background = '#2a2d35';
                    circle.innerHTML = '<i class="fa-solid fa-couch" style="color:#555; font-size:14px;"></i>';
                }

                // Label
                const labelDiv = document.createElement('div');
                labelDiv.innerText = label;
                labelDiv.style.fontSize = '12px';
                labelDiv.style.fontWeight = '600';
                labelDiv.style.color = (isToday || isSelected) ? '#fff' : 'var(--text-mute)';

                col.appendChild(circle);
                col.appendChild(labelDiv);

                container.appendChild(col);
            });
        }

        // Modal Toggle Logic
        document.getElementById('btn-show-foods').addEventListener('click', () => {
            document.getElementById('food-list-modal').style.display = 'flex';
            document.dispatchEvent(new CustomEvent('loadFoodsRequest'));
        });

        document.getElementById('btn-close-foods').addEventListener('click', () => {
            document.getElementById('food-list-modal').style.display = 'none';
        });
    </script>
    <script type="module">
        import { supabase } from './supabase-config.js';

        let foodsLoaded = false;
        let allFoods = [];

        function getLevenshteinDistance(s, t) {
            if (!s.length) return t.length;
            if (!t.length) return s.length;
            const arr = [];
            for (let i = 0; i <= t.length; i++) {
                arr[i] = [i];
                for (let j = 1; j <= s.length; j++) {
                    arr[i][j] = i === 0 ? j : Math.min(
                        arr[i - 1][j] + 1,
                        arr[i][j - 1] + 1,
                        arr[i - 1][j - 1] + (s[j - 1] === t[i - 1] ? 0 : 1)
                    );
                }
            }
            return arr[t.length][s.length];
        }

        function isFuzzyMatch(text, query) {
            if (!text) return false;
            text = text.toLowerCase();
            query = query.toLowerCase();
            
            // Wenn die genaue Zeichenkette enthalten ist, sofort Treffer
            if (text.includes(query)) return true;
            
            // Zu kurze Anfragen (<=2 Zeichen) müssen exakt im Wort vorkommen (keine Tippfehler)
            if (query.length <= 2) return false;

            // Intelligente Suche: Erlaubt Tippfehler erst ab 3 Zeichen
            const words = text.split(/[\s\-]+/);
            // 3-5 Zeichen = 1 Fehler erlaubt, ab 6 Zeichen = 2 Fehler erlaubt
            const maxErrors = query.length <= 5 ? 1 : 2;
            
            for (let word of words) {
                if (word.length < query.length - maxErrors) continue; // Wort ist sowieso zu kurz
                
                let compareLen = Math.min(word.length, query.length);
                let substring = word.substring(0, compareLen);
                
                // Levenshtein nur bei ausreichend langen Suchanfragen testen
                if (getLevenshteinDistance(substring, query) <= maxErrors) {
                    return true;
                }
            }
            return false;
        }

        function renderFoods() {
            const container = document.getElementById('foods-container');
            container.innerHTML = '';

            if (!allFoods || allFoods.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888; margin-top:20px;">Noch keine Nahrungsmittel vorhanden.</div>';
                return;
            }

            const field = document.getElementById('foods-sort-field').value;
            const dir = document.getElementById('foods-sort-dir').value;
            const searchTerm = document.getElementById('foods-search-input').value.trim();
            
            let displayFoods = [...allFoods];

            // 1. Filtern (Suche)
            if (searchTerm.length > 0) {
                displayFoods = displayFoods.filter(f => {
                    const searchSpace = `${f.name || ''} ${f.brand || ''}`;
                    return isFuzzyMatch(searchSpace, searchTerm);
                });
            }

            // 2. Sortieren
            if (field !== 'standard') {
                displayFoods.sort((a, b) => {
                    let valA, valB;
                    if (field === 'name') {
                        valA = (a.name || '').toLowerCase();
                        valB = (b.name || '').toLowerCase();
                    } else if (field === 'kcal') {
                        valA = a.kcal || 0;
                        valB = b.kcal || 0;
                    } else if (field === 'base') {
                        valA = a.base_amount_g || 0;
                        valB = b.base_amount_g || 0;
                    } else if (field === 'protein') {
                        valA = a.protein || 0;
                        valB = b.protein || 0;
                    }

                    if (valA < valB) return dir === 'asc' ? -1 : 1;
                    if (valA > valB) return dir === 'asc' ? 1 : -1;
                    return 0;
                });
            }

            displayFoods.forEach(food => {
                const card = document.createElement('div');
                card.style.background = '#2a2d35';
                card.style.borderRadius = '12px';
                card.style.padding = '15px';
                card.style.display = 'flex';
                card.style.flexDirection = 'column';
                card.style.gap = '5px';

                const titleRow = document.createElement('div');
                titleRow.style.fontSize = '16px';
                titleRow.style.fontWeight = '700';
                titleRow.style.color = '#fff';
                
                if (food.brand) {
                    titleRow.innerText = `${food.name} (${food.brand})`;
                } else {
                    titleRow.innerText = food.name;
                }

                const subRow = document.createElement('div');
                subRow.style.fontSize = '13px';
                subRow.style.color = 'var(--text-mute)';
                
                const pKcal = food.kcal || 0;
                const pProt = food.protein || 0;
                const pBase = food.base_amount_g || 100;

                let baseStr = `${pBase}g`;
                if (pBase === 1 && food.piece_name) {
                    baseStr = `1 ${food.piece_name}`;
                }

                subRow.innerText = `${pKcal}kcal, ${baseStr}, ${pProt}g Eiweiß`;

                card.appendChild(titleRow);
                card.appendChild(subRow);
                container.appendChild(card);
            });

            // Falls die Suche keine Treffer liefert
            if (displayFoods.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888; margin-top:20px;">Keine Treffer für deine Suche.</div>';
            }
        }

        const searchInput = document.getElementById('foods-search-input');
        const searchClear = document.getElementById('foods-search-clear');

        searchInput.addEventListener('input', () => {
            searchClear.style.display = searchInput.value.length > 0 ? 'block' : 'none';
            renderFoods();
        });

        searchClear.addEventListener('click', () => {
            searchInput.value = '';
            searchClear.style.display = 'none';
            renderFoods();
            searchInput.focus();
        });

        document.getElementById('foods-sort-field').addEventListener('change', renderFoods);
        document.getElementById('foods-sort-dir').addEventListener('change', renderFoods);

        document.addEventListener('loadFoodsRequest', async () => {
            if(foodsLoaded) return; // Load only once
            
            const container = document.getElementById('foods-container');
            const loading = document.getElementById('foods-loading');

            try {
                // Read from the foods table
                const { data: foods, error } = await supabase
                    .from('foods')
                    .select('name, brand, kcal, protein, base_amount_g, piece_name');

                if (error) throw error;

                allFoods = foods || [];
                if (loading) loading.style.display = 'none';
                foodsLoaded = true;

                // Initial render
                renderFoods();

            } catch (err) {
                console.error("Error fetching foods:", err);
                if (loading) loading.style.display = 'none';
                container.innerHTML = `<div style="text-align:center; color:#ff4444; margin-top:20px;">Fehler beim Laden (${err.message}).</div>`;
            }
        });
    </script>
</body>
</html>
