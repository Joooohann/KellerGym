<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KellerGym - Login</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="theme-color" content="#08090c">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_modal.css">
    
    <style>
        /* Specific adjustments for login screen to center it */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #08090c;
        }
        #app-viewport {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
    </style>
</head>
<body class="no-nav">

    <div id="app-viewport">
        <!-- LOGIN SCREEN -->
        <div id="screen-login" class="screen active">
            <div style="text-align: center; margin-bottom: 40px;">
                <i class="fa-solid fa-dungeon" style="font-size: 50px; color: var(--primary); margin-bottom: 20px;"></i>
                <h1 style="font-size: 36px;">Keller<span style="color: var(--primary);">Gym</span></h1>
                <p class="subtitle">Wo Ausreden keinen Empfang haben 0.2</p>
            </div>

            <div class="carbon-card">
                <div class="input-group">
                    <label>Benutzername</label>
                    <input type="text" id="login-user" class="input-field" placeholder="Benutzername eingeben">
                </div>
                <div class="input-group">
                    <label>Passwort</label>
                    <input type="password" id="login-pass" class="input-field" placeholder="Passwort eingeben">
                </div>
                <!-- Button triggers navigation via script.js -->
                <button class="btn" id="btn-login-action">Login <i class="fa-solid fa-arrow-right"></i></button>
                <button class="btn btn-secondary" id="btn-test-gen" style="margin-top: 15px;">
                    Test Animation <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Load main script -->
    <script src="script.js"></script>
</body>
</html>
